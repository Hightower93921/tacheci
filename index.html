<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Rod Tachecích</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/starback@2.1.1/dist/starback.global.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #f8f8f8;
    }

    canvas#bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #111 0%, #000 100%);
      z-index: 1;
      opacity: 0.8;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
    }

    .title {
      font-size: 4rem;
      color: #FFD700;
      letter-spacing: 0.2rem;
      animation: typing 4s steps(14) 1s forwards;
      border-right: 2px solid #FFD700;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      margin-bottom: 2rem;
    }

    @keyframes typing {
      to { width: 100%; border-right: none; }
    }

    .location {
      opacity: 0;
      font-size: 1.3rem;
      letter-spacing: 0.1rem;
      margin: 0.3rem 0;
      color: #ccc;
      animation: fadeInUp 1s forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quote {
      margin-top: 3rem;
      font-size: 1rem;
      color: #666;
      opacity: 0;
      animation: fadeInQuote 2s ease 12s forwards;
    }

    @keyframes fadeInQuote {
      to { opacity: 1; }
    }

    .footer {
      position: absolute;
      bottom: 15px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
      z-index: 3;
    }

    .footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #FFD700;
    }

    .construction {
      margin-top: 3rem;
      font-size: 1.1rem;
      color: #ff5555;
      opacity: 0;
      animation: fadeInConstruct 2s ease 9s forwards, pulse 3s ease-in-out infinite;
    }

    @keyframes fadeInConstruct {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="center">
    <div class="title">Rod Tachecích</div>

    <div id="locs"></div>

    <div class="construction">Na těchto stránkách se začíná pracovat.</div>

    <div class="quote">„Naše jména jsou tesána do času, ne do kamene.“</div>
  </div>

  <div class="footer">
    Spravuje <a href="https://www.martinuhlar.cz" target="_blank">Martin Uhlář</a>
  </div>

  <script>
    // Starback animace hvězd
    const canvas = document.getElementById('bg-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const starback = new Starback(canvas, {
      type: 'dot',
      quantity: 300,
      direction: 270,
      backgroundColor: ['#000', '#111'],
      randomOpacity: true,
      speed: 0.2
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      starback.generateStar(300);
    });

    // Lokace
    const locations = [
      "Královice",
      "Strážnice",
      "Střednice",
      "Brňany",
      "Chvalín",
      "Jarpice",
      "Třebíz",
      "Veltěže",
      "Vysoké Mýto"
    ];

    const locContainer = document.getElementById('locs');

    locations.forEach((loc, i) => {
      const div = document.createElement('div');
      div.className = 'location';
      div.textContent = loc;
      div.style.animationDelay = `${4.5 + i * 0.7}s`;
      locContainer.appendChild(div);
    });
  </script>
</body>
</html>
